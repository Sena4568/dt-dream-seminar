<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1차시 복습 퀴즈 — 보고서의 구조 잡기</title>
<style>
  :root {
    --coral: #D97757;
    --coral-dark: #C25E3F;
    --navy: #1A2332;
    --green: #2E7D32;
    --green-bg: #E6F4E6;
    --red: #C0392B;
    --red-bg: #FBEAE8;
    --paper: #FBF8F5;
    --line: #E7DED7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", "맑은 고딕", "Malgun Gothic", sans-serif;
    background: var(--paper);
    color: var(--navy);
    line-height: 1.6;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .quiz {
    width: 100%;
    max-width: 640px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(26, 35, 50, 0.07);
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 28px 32px;
  }
  header .tag {
    display: inline-block;
    background: var(--coral);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }
  header h1 { font-size: 22px; margin-top: 12px; }
  header p { font-size: 14px; opacity: 0.75; margin-top: 4px; }
  .bar { height: 6px; background: var(--line); }
  .bar > div { height: 100%; width: 0; background: var(--coral); transition: width 0.3s ease; }
  .body { padding: 32px; }
  .qnum { font-size: 13px; font-weight: 700; color: var(--coral); letter-spacing: 0.5px; }
  .question { font-size: 19px; font-weight: 700; margin: 8px 0 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    text-align: left;
    font-size: 16px;
    font-family: inherit;
    color: var(--navy);
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover:not(:disabled) { border-color: var(--coral); }
  .option:disabled { cursor: default; }
  .option.correct { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 700; }
  .option.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .feedback { margin-top: 18px; font-size: 15px; font-weight: 600; min-height: 24px; }
  .feedback.ok { color: var(--green); }
  .feedback.no { color: var(--red); }
  .footer { margin-top: 24px; display: flex; justify-content: flex-end; }
  button.next {
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: var(--coral);
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    cursor: pointer;
  }
  button.next:hover { background: var(--coral-dark); }
  button.next:disabled { background: var(--line); color: #fff; cursor: default; }
  .result { text-align: center; padding: 16px 0; }
  .result .score { font-size: 48px; font-weight: 800; color: var(--coral); }
  .result h2 { font-size: 20px; margin-bottom: 6px; }
  .result p { color: #6b6258; font-size: 15px; margin-bottom: 22px; }
  .retry {
    font-family: inherit; font-size: 15px; font-weight: 700;
    color: var(--navy); background: #fff;
    border: 1.5px solid var(--navy); border-radius: 10px;
    padding: 12px 24px; cursor: pointer;
  }
  .retry:hover { background: var(--navy); color: #fff; }
</style>
</head>
<body>
<div class="quiz">
  <header>
    <span class="tag">신입사원 보고서 작성 기초</span>
    <h1>1차시 복습 퀴즈 — 보고서의 구조 잡기</h1>
    <p>핵심 개념을 잘 기억하고 있는지 확인해 보세요</p>
  </header>
  <div class="bar"><div id="bar"></div></div>
  <div class="body" id="body"></div>
</div>

<script>
  const QUESTIONS = [
    {
      q: "보고서의 4가지 구성 요소에 해당하지 않는 것은?",
      options: ["목적", "결론", "분량", "실행"],
      answer: 2,
      explain: "보고서의 4요소는 목적·결론·근거·실행입니다. 분량은 요소가 아닙니다."
    },
    {
      q: "두괄식 보고서에서 첫 문단에 와야 하는 것은?",
      options: ["자료 수집 과정", "결론", "참고 문헌", "작성자 소개"],
      answer: 1,
      explain: "두괄식은 결론을 맨 앞에 둡니다. 바쁜 의사결정자가 첫 문단에서 핵심을 찾습니다."
    },
    {
      q: "보고서 쓰기 5단계 흐름에서 '구조 잡기' 바로 다음 단계는?",
      options: ["자료 수집", "초안 작성", "제출", "검토·수정"],
      answer: 1,
      explain: "흐름은 자료 수집 → 구조 잡기 → 초안 작성 → 검토·수정 → 제출 순서입니다."
    },
    {
      q: "'보고서는 글짓기가 아니다'라는 말이 강조하는 것은?",
      options: ["화려한 표현", "긴 분량", "명확한 목적", "어려운 용어"],
      answer: 2,
      explain: "보고서는 읽는 사람이 판단하고 행동하도록 돕는 '목적이 있는 문서'입니다."
    },
    {
      q: "구성 요소 중 '읽는 사람이 무엇을 하면 되는가'에 답하는 것은?",
      options: ["목적", "근거", "결론", "실행"],
      answer: 3,
      explain: "'실행'은 읽는 사람이 취해야 할 행동을 알려 주는 요소입니다."
    }
  ];

  let order = [];
  let idx = 0;
  let score = 0;
  const body = document.getElementById("body");
  const bar = document.getElementById("bar");

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function start() {
    order = shuffle(QUESTIONS.map((_, i) => i));
    idx = 0;
    score = 0;
    renderQuestion();
  }

  function renderQuestion() {
    const q = QUESTIONS[order[idx]];
    bar.style.width = ((idx) / QUESTIONS.length * 100) + "%";
    body.innerHTML = `
      <div class="qnum">문제 ${idx + 1} / ${QUESTIONS.length}</div>
      <div class="question">${q.q}</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="footer">
        <button class="next" id="next" disabled>${idx + 1 === QUESTIONS.length ? "결과 보기" : "다음 문제"}</button>
      </div>
    `;
    const optWrap = document.getElementById("options");
    q.options.forEach((text, i) => {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.textContent = text;
      btn.onclick = () => choose(i, q);
      optWrap.appendChild(btn);
    });
    document.getElementById("next").onclick = nextQuestion;
  }

  function choose(i, q) {
    const buttons = document.querySelectorAll(".option");
    buttons.forEach((b, bi) => {
      b.disabled = true;
      if (bi === q.answer) b.classList.add("correct");
      if (bi === i && i !== q.answer) b.classList.add("wrong");
    });
    const fb = document.getElementById("feedback");
    if (i === q.answer) {
      score++;
      fb.className = "feedback ok";
      fb.textContent = "정답입니다! " + q.explain;
    } else {
      fb.className = "feedback no";
      fb.textContent = "아쉬워요. " + q.explain;
    }
    document.getElementById("next").disabled = false;
  }

  function nextQuestion() {
    idx++;
    if (idx < QUESTIONS.length) {
      renderQuestion();
    } else {
      renderResult();
    }
  }

  function renderResult() {
    bar.style.width = "100%";
    const total = QUESTIONS.length;
    let msg = "";
    if (score === total) msg = "완벽합니다! 1차시 핵심을 모두 기억하고 있어요.";
    else if (score >= total - 1) msg = "훌륭해요. 거의 다 맞혔습니다.";
    else if (score >= total / 2) msg = "잘했어요. 틀린 개념만 다시 살펴보세요.";
    else msg = "교안을 한 번 더 복습하고 다시 도전해 보세요.";
    body.innerHTML = `
      <div class="result">
        <div class="score">${score} / ${total}</div>
        <h2>복습 완료!</h2>
        <p>${msg}</p>
        <button class="retry" id="retry">다시 풀기</button>
      </div>
    `;
    document.getElementById("retry").onclick = start;
  }

  start();
</script>
</body>
</html>
